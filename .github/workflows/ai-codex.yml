name: Update AI Codex

on:
  push:
    branches: [main]

jobs:
  update-codex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx ai-codex
      - name: Commit updated codex
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .ai-codex/
          git diff --cached --quiet || git commit -m "chore: update ai-codex indexes"
          git push
